<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calendar-container">
        <header class="calendar-header">
            <div class="header-dots"></div>
            <h1>Calendar <span class="year-accent">2026</span></h1>
            <p>All 12 months &middot; Click any day to add events</p>
        </header>

        <main class="calendar-grid-container">
            <div id="calendar-grid"></div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-date-title">Add Event</h3>
                <button class="modal-close-btn" id="modal-close">&#x2715;</button>
            </div>
                <div class="modal-body">
                    <input type="text" id="event-title-input" placeholder="Event name..." maxlength="50" />
                    <select id="event-type-select">
                        <option value="holiday">🏖 Holiday</option>
                        <option value="personal" selected>💛 Personal</option>
                        <option value="work">💼 Work</option>
                        <option value="special">⭐ Special</option>
                        <option value="fun">🎉 Fun</option>
                    </select>
                    <div class="modal-actions">
                        <button id="btn-save-event">Add Event</button>
                        <button id="btn-cancel-modal" class="btn-secondary">Cancel</button>
                    </div>
                    <div id="existing-events-container"></div>
                    <!-- Settings section -->
                    <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border);">
                        <label for="events-per-day">Events per day:</label>
                        <select id="events-per-day" style="width: 100%; margin-top: 8px;">
                            <option value="1">1 event</option>
                            <option value="2" selected>2 events</option>
                            <option value="3">3 events</option>
                            <option value="4">4 events</option>
                            <option value="5">5 events</option>
                        </select>
                    </div>
                </div>
        </div>
    </div>

    <!-- IMPORTANT: script at end of body so DOM exists when JS runs -->
    <script src="calendar.js"></script>
</body>
</html>
